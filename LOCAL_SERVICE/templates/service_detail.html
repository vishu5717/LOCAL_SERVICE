<!DOCTYPE html>
<html>
<head>
    <title>Book Service</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f3f4f6;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .slot-btn {
            border-radius: 20px;
        }

        .active-slot {
            background: #4f46e5 !important;
            color: white !important;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card p-4">

        <h3>{{ service.service_name }}</h3>
        <p>{{ service.service_description }}</p>
        <p><b>₹ {{ service.price_range }}</b></p>

        <!-- MESSAGES -->
        {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}

        <form method="POST" id="bookingForm">
            {% csrf_token %}

            <!-- DATE -->
            <label>Select Date</label>
            <input type="date" id="dateInput" name="date"
                   class="form-control"
                   min="{{ today }}" required>

            <!-- SLOT -->
            <label class="mt-3">Select Time</label>
            <div id="slotContainer" class="mt-2">
                <p>Select date first ⏳</p>
            </div>

            <!-- HIDDEN -->
            <input type="hidden" name="time" id="selectedTime">

            <button id="bookBtn" class="btn btn-primary mt-4 w-100">
                Book Now
            </button>
        </form>

    </div>

</div>

<script>

const dateInput = document.getElementById("dateInput");
const slotContainer = document.getElementById("slotContainer");
const selectedTime = document.getElementById("selectedTime");
const bookBtn = document.getElementById("bookBtn");

// 🔥 Load slots
dateInput.addEventListener("change", function () {

    let selectedDate = this.value;

    slotContainer.innerHTML = "Loading...";
    bookBtn.disabled = true;

    fetch("{% url 'get_slots' %}?provider_id={{ service.provider_id.id }}&date=" + selectedDate)
        .then(res => res.json())
        .then(data => {

            slotContainer.innerHTML = "";
            selectedTime.value = "";

            if (data.slots.length > 0) {

                data.slots.forEach(slot => {

                    let btn = document.createElement("button");

                    btn.type = "button";
                    btn.className = "btn btn-outline-primary m-1 slot-btn";
                    btn.innerText = slot.display;

                    btn.onclick = function () {

                        document.querySelectorAll(".slot-btn")
                            .forEach(b => b.classList.remove("active-slot"));

                        btn.classList.add("active-slot");

                        selectedTime.value = slot.start;
                    };

                    slotContainer.appendChild(btn);
                });

                bookBtn.disabled = false;

            } else {

                slotContainer.innerHTML = "<p class='text-danger'>No slots available ❌</p>";
                bookBtn.disabled = true;
            }
        });
});


// 🔥 Submit validation
document.getElementById("bookingForm").addEventListener("submit", function(e){

    if (!selectedTime.value) {
        e.preventDefault();
        alert("Please select time ⚠️");
    }
});

</script>

</body>
</html>
