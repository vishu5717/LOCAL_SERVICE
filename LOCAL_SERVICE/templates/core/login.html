{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login - Local Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url("{% static 'images/abc.jpg' %}") no-repeat center center/cover;
            position: relative;
        }

        /* Dark Overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: rgba(0,0,0,0.6);
        }

        /* Center Card */
        .login-container {
            position: relative;
            z-index: 2;
            height: 100vh;
        }

        .login-card {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }

        .login-btn {
            background: linear-gradient(90deg, #4f46e5, #6366f1);
            color: white;
            border: none;
        }

        .login-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
<!-- TOP NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark position-absolute w-100" style="z-index:3;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🏠 Local Service</a>

        <div class="ms-auto">
            <a href="{% url 'home' %}" class="btn btn-outline-light me-2">Home</a>

            {% if user.is_authenticated %}
                <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-success">Login</a>
            {% endif %}
        </div>
    </div>
</nav>
<div class="container d-flex align-items-center justify-content-center login-container">

    <div class="login-card">

        <!-- Logo -->
        <div class="text-center mb-4">
            <h3 class="fw-bold">🏠 Local Service</h3>
            <p class="text-muted">Login to your account</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <!-- Username -->
            <div class="input-group mb-3">
                <span class="input-group-text">
                    <i class="bi bi-person-fill"></i>
                </span>
                <input type="text" class="form-control" name="username" placeholder="Email or Username" required>
            </div>

            <!-- Password -->
            <div class="input-group mb-3">
                <span class="input-group-text">
                    <i class="bi bi-lock-fill"></i>
                </span>
                <input type="password" id="password" class="form-control" name="password" placeholder="Password" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                    <i class="bi bi-eye-fill"></i>
                </button>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input">
                <label class="form-check-label text-dark">Remember Me</label>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn login-btn">Login</button>
            </div>

            <div class="mt-3 d-flex justify-content-between">
                <a href="#" class="text-decoration-none">Forgot Password?</a>
                <a href="{% url 'signup' %}" class="text-decoration-none">Create Account</a>
            </div>

        </form>

    </div>

</div>

<script>
function togglePassword() {
    var x = document.getElementById("password");
    x.type = x.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
