{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo">Local Service <span>Management</span></div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="{% url 'login' %}">Log In</a>
    </div>
</nav>

<div class="container">

    <!-- LEFT FORM -->
    <div class="form-section">
        <h1>Create an Account</h1>
        <p>Sign up to manage your local services.</p>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
            <div class="input-box">
                {{ field }}
            </div>
            <small style="color:red;">
                {{ field.errors }}
            </small>
            {% endfor %}

            <button type="submit" class="btn">Sign Up</button>

            #<p class="login-link">
                Already have an account?
                <a href="{% url 'login' %}">Log In</a>
            </p>
        </form>
    </div>

    <!-- RIGHT IMAGE -->
    <div class="image-section">
        <img src="{% static 'images/service-man.png' %}" alt="service">
    </div>

</div>

</body>
</html>
