{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Book Service</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body {
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    height:100vh;
}

body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

.form-card {
    background: rgba(255,255,255,0.95);
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.btn-book {
    background: linear-gradient(90deg,#4f46e5,#6366f1);
    color:white;
    border:none;
}

.btn-book:hover {
    opacity:0.9;
}
</style>

</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="form-card col-md-5">

<h3 class="text-center mb-4">📅 Book Service</h3>

<!-- Show Service Name -->
{% if service %}
<p class="text-center text-muted">
    Booking for: <strong>{{ service.name }}</strong>
</p>
{% endif %}

<!-- Error -->
{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<form method="POST">
{% csrf_token %}

<!-- Date -->
<div class="mb-3">
<label class="form-label">Select Date</label>
<input type="date" name="date" min="{{ today }}" class="form-control" required>
</div>

<!-- Time -->
<div class="mb-3">
<label class="form-label">Select Time</label>
<input type="time" name="time" class="form-control" required>
</div>

<!-- Address -->
<div class="mb-3">
<label class="form-label">Service Address</label>
<textarea name="address" class="form-control" rows="3" placeholder="Enter full address" required></textarea>
</div>

<!-- Submit -->
<div class="d-grid">
<button type="submit" class="btn btn-book">
    Confirm Booking
</button>
<a href="{% url 'book_service' service.id %}" class="btn btn-primary">
    Book Now
</a>
</div>


</form>

</div>

</div>

</body>
</html>
